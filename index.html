<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Smaki ❤️</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffe6f0;
            text-align: center;
            padding-top: 80px;
            overflow: hidden;
        }

        h1 {
            color: #ff4d88;
        }

        p {
            font-size: 18px;
            max-width: 600px;
            margin: 20px auto;
        }

        button {
            padding: 12px 24px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        #yesBtn {
            background-color: #ff4d88;
            color: white;
        }

        #noBtn {
            background-color: #cccccc;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>🎂 Happy Birthday, Smaki! 🎂</h1>

    <p>
        Dear Smaki,<br><br>
        Wishing you a birthday filled with happiness, laughter,
        and unforgettable memories. ❤️<br><br>
        Thank you for being such an amazing person.
    </p>

    <h2>One important question... ❤️</h2>
    <h2>Do you love me?</h2>

    <button id="yesBtn" onclick="yesClicked()">Yes 💖</button>
    <button id="noBtn">No 😅</button>

    <script>
        function yesClicked() {
            document.body.innerHTML = `
                <div style="padding-top:120px;">
                    <h1>❤️ YAYY! I LOVE YOU TOO, SMAKI! ❤️</h1>
                    <h2>🥰🥰🥰</h2>
                    <p>Happy Birthday! 🎂🎉</p>
                </div>
            `;
        }

        const noBtn = document.getElementById("noBtn");

        function moveButton() {
            const x = Math.random() * (window.innerWidth - 120);
            const y = Math.random() * (window.innerHeight - 60);

            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        noBtn.addEventListener("mouseover", moveButton);
        noBtn.addEventListener("touchstart", moveButton);
    </script>

</body>
</html>
